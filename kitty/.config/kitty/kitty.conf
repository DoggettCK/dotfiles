# Font Configuration
font_family JetBrainsMonoNL Nerd Font Mono
font_size 14.0

# Window Configuration
# window_padding_width 12
background_opacity 0.90
background_blur 8
hide_window_decorations yes

# Cursor Configuration
cursor_shape block
cursor_blink_interval 0.5
cursor_trail 1
cursor_beam_thickness 24

# Scrollback
scrollback_lines 3000

# Terminal features
copy_on_select yes
strip_trailing_spaces smart

# Key bindings for common actions
map ctrl+shift+n new_window_with_cwd
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab
map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0

# Alt+N to switch tabs
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# Cmd+N to switch tabs
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Tab configuration
tab_bar_style powerline
tab_powerline_style round
tab_bar_align left

# Shell integration
shell_integration enabled

# Dank color generation
globinclude dank-tabs.conf
globinclude dank-theme.conf

# Include overrides.conf, if it exists
# Any settings you want to override, add to non-source-controlled (unless you
# want to add them) config in ~/.config/kitty/overrides.conf
globinclude overrides.conf

# Include theme.conf, if it exists
# Recommend cloning https://github.com/catppuccin/kitty and symlinking
# ~/.config/kitty/theme.conf to the preferred path
globinclude theme.conf
